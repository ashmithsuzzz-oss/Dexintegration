<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minima Lottery + DEX</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<main>

<header>
  <h1>🎰 Minima Lottery</h1>
  <p>FAIR • ON-CHAIN • TRANSPARENT</p>

  <div id="walletStatus" class="connection-status">
    ❌ MiniMask not found
  </div>
</header>

<!-- COUNTDOWN -->
<div class="card">
  <div class="countdown-label">⏳ NEXT DRAW</div>
  <div id="countdown" class="countdown-display">--:--:--</div>
</div>

<!-- PRIZE -->
<div class="card" id="prizeSection">
  <div class="section-label">💰 PRIZE POOL</div>
  <div id="prizePool" class="large-value">0 MINIMA</div>
</div>

<!-- TICKET -->
<div class="card" id="ticketSection">
  <div class="section-label">🎟 TICKET PRICE</div>
  <div class="large-value">0.0000001</div>
  <button onclick="buyTicket()">Buy Ticket</button>
</div>

<!-- ENTRIES -->
<div class="card">
  <div class="section-label">👥 ENTRIES</div>
  <div id="entries">Loading...</div>
</div>

<!-- USER -->
<div class="card">
  <div class="section-label">📊 YOUR STATS</div>
  <div id="userStats">Loading...</div>
</div>

<!-- DEX -->
<div class="card">
  <div class="section-label">🔄 DEX SWAP</div>

  <input id="dexAmount" placeholder="Amount MINIMA" type="number"/>
  <button onclick="runDexSwap()">Swap</button>

  <div id="dexStatus">Idle</div>
</div>

</main>

<script src="app.js"></script>
</body>
</html>
